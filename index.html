<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 활용 기회 탐색 — 문제 중심 지도</title>
<style>
  :root{
    --navy:#1F3A5F; --blue:#2E75B6; --light:#DCE6F1; --teal:#2C7A7B;
    --ink:#1a2330; --muted:#64748b; --line:#e3e8ef; --bg:#eef2f7;
    --green:#3f8f4f; --amber:#b5701a; --red:#c0432f; --chip:#eef4fb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);}
  #stage{height:100vh;display:flex;align-items:center;justify-content:center;padding:26px;}
  .slide{display:none;width:min(1060px,96vw);height:min(660px,90vh);background:#fff;border-radius:18px;
    box-shadow:0 18px 50px rgba(20,40,80,.16);padding:40px 50px;overflow:auto;position:relative;}
  .slide.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .kicker{display:inline-block;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--blue);
    background:var(--chip);padding:5px 12px;border-radius:999px;margin-bottom:14px;}
  h1.title{font-size:44px;line-height:1.15;color:var(--navy);font-weight:800;letter-spacing:-.01em}
  h2{font-size:29px;color:var(--navy);font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
  .sub{font-size:18px;color:var(--blue);font-weight:600;margin-top:10px}
  .lead{font-size:16.5px;color:var(--ink);line-height:1.7;margin-top:12px}
  .muted{color:var(--muted)}
  .divider{height:4px;width:72px;background:var(--blue);border-radius:2px;margin:16px 0}
  .meta{position:absolute;bottom:24px;left:50px;font-size:13px;color:var(--muted)}
  ul{margin:8px 0 0 2px;list-style:none}
  li{position:relative;padding:6px 0 6px 22px;font-size:15px;line-height:1.55}
  li::before{content:"";position:absolute;left:2px;top:13px;width:7px;height:7px;border-radius:2px;background:var(--blue)}
  .pain li::before{background:var(--red)}
  b{color:var(--navy)}
  .grid{display:grid;gap:13px;margin-top:14px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
  .card{border:1px solid var(--line);border-radius:14px;padding:15px 17px;background:#fcfdff}
  .card h3{font-size:15.5px;color:var(--navy);margin-bottom:5px}
  .tag{display:inline-block;font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--chip);color:var(--blue);margin:0 6px 6px 0}
  .ex{background:#f1f8f8;border:1px solid #cfe6e6;border-radius:13px;padding:13px 16px;margin-top:6px}
  .ex h3{color:var(--teal);font-size:14px;margin-bottom:5px;font-weight:800}
  .scn{background:#eef7f7;border-left:5px solid var(--teal);border-radius:0 10px 10px 0;padding:11px 15px;margin-top:10px;font-size:14.5px;line-height:1.6}
  .scn b.t{color:var(--teal)}
  .pillrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .pill{font-size:13px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 11px}
  .ref{font-size:12.5px;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line);padding-top:9px}
  table{border-collapse:collapse;width:100%;margin-top:12px;font-size:13.5px}
  th{background:var(--navy);color:#fff;text-align:left;padding:8px 10px;font-weight:700}
  td{border:1px solid var(--line);padding:7px 10px;vertical-align:top}
  tr:nth-child(even) td{background:#f8fafc}
  .b-green{color:var(--green);font-weight:700}.b-amber{color:var(--amber);font-weight:700}.b-red{color:var(--red);font-weight:700}
  .two{display:grid;grid-template-columns:1.05fr 1fr;gap:22px;margin-top:8px}
  .note{font-size:13.5px;color:var(--muted);background:#f8fafc;border-left:3px solid var(--blue);padding:9px 13px;border-radius:0 8px 8px 0;margin-top:12px;line-height:1.55}
  .score{display:inline-flex;align-items:center;gap:6px;font-size:13px;margin-right:16px;color:var(--muted);font-weight:700}
  .dots{letter-spacing:1px;font-size:13px}
  .d-int{color:var(--blue)}.d-imp{color:var(--teal)}
  #bar{position:fixed;top:0;left:0;height:4px;background:var(--blue);width:0;transition:width .3s;z-index:30}
  .nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
    background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 16px;box-shadow:0 8px 24px rgba(20,40,80,.14);z-index:30}
  .nav button{border:none;background:var(--navy);color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer}
  .nav button:disabled{opacity:.35;cursor:default}
  #count{font-size:14px;color:var(--muted);min-width:58px;text-align:center;font-variant-numeric:tabular-nums}
  .hint{position:fixed;bottom:20px;right:20px;font-size:12px;color:var(--muted);z-index:20}
  @media print{.nav,.hint,#bar{display:none}.slide{display:block!important;page-break-after:always;box-shadow:none;height:auto;width:100%}}
</style>
</head>
<body>
<div id="bar"></div>
<div id="stage"></div>
<div class="nav"><button id="prev">‹</button><span id="count">1 / 17</span><button id="next">›</button></div>
<div class="hint">← → 키로 이동 · P로 인쇄</div>

<script>
function dots(n,cls){return `<span class="dots ${cls}">${"●".repeat(n)}${"○".repeat(5-n)}</span>`;}

function problemSlide(o){
  return `<span class="kicker">${o.code} · ${o.label}</span>
  <h2>${o.title}</h2>
  <div style="margin:8px 0 4px">
    <span class="score">강도 ${dots(o.si,"d-int")}</span>
    <span class="score">임팩트 ${dots(o.ii,"d-imp")}</span>
  </div>
  <div class="two">
    <div>
      <div style="font-size:12.5px;font-weight:800;color:var(--blue);margin-top:4px">유저 상황</div>
      <p style="font-size:14.5px;line-height:1.6;margin-top:3px">${o.situation}</p>
      <div style="font-size:12.5px;font-weight:800;color:var(--red);margin-top:11px">자사 페인 (해외여행 다이어리)</div>
      <ul class="pain">${o.pains.map(p=>`<li>${p}</li>`).join("")}</ul>
    </div>
    <div>
      ${o.scenarios.map(s=>`<div class="scn"><b class="t">이렇게 동작한다 · ${s[0]}</b><br>${s[1]}</div>`).join("")}
    </div>
  </div>
  <div style="font-size:12.5px;font-weight:800;color:var(--teal);margin-top:12px">가능한 AI 접근 · 유형(열림)</div>
  <div class="pillrow">${o.types.map(t=>`<span class="pill">${t}</span>`).join("")}</div>
  <div class="ref"><b>레퍼런스</b> — ${o.refs}</div>`;
}

let i=0;
const stage=document.getElementById("stage"), countEl=document.getElementById("count");
const prevB=document.getElementById("prev"), nextB=document.getElementById("next"), bar=document.getElementById("bar");
function render(){
  stage.innerHTML=`<div class="slide active">${slides[i]}</div>`;
  countEl.textContent=`${i+1} / ${slides.length}`;
  prevB.disabled=i===0; nextB.disabled=i===slides.length-1;
  bar.style.width=`${i/(slides.length-1)*100}%`;
}
function go(n){i=Math.max(0,Math.min(slides.length-1,n));render();}
prevB.onclick=()=>go(i-1); nextB.onclick=()=>go(i+1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){e.preventDefault();go(i+1);}
  if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();go(i-1);}
  if(e.key==="Home")go(0); if(e.key==="End")go(slides.length-1);
  if(e.key==="p"||e.key==="P")window.print();
});
render();
</script>
